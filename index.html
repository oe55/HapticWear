<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>HapticWear</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#09090B">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#09090B;color:#AAA;font-family:Calibri,'Segoe UI',sans-serif;min-height:100vh;-webkit-user-select:none;user-select:none}
.hd{padding:14px 16px;border-bottom:1px solid #1A1A1E;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:15px;font-weight:300;letter-spacing:4px}.logo b{color:#fff;font-weight:500}.logo span{color:#CECED6;font-weight:300}
.st{font-size:10px;color:#444;letter-spacing:2px;font-family:Consolas,monospace}
.st.on{color:#fff}.st.on::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:#fff;margin-right:6px;animation:p 1.5s infinite}
.st.cal{color:#888}.st.cal::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:#888;margin-right:6px;animation:p .5s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
.w{padding:12px}
.viewport{width:100%;height:200px;border-radius:6px;overflow:hidden;background:#09090B;position:relative;cursor:grab;margin-bottom:10px;border:1px solid #1A1A1E}
.viewport canvas{width:100%;height:100%;display:block}
.btns{display:flex;gap:6px;margin-bottom:10px}
.btn{flex:1;padding:13px;background:#151518;color:#AAA;border:1px solid #222;font-family:Calibri,sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;cursor:pointer;border-radius:4px}
.btn:active{transform:scale(.98);opacity:.8}
.btn.go{background:#1A1A1E;color:#fff;border-color:#444}
.btn.ble{background:#111;border:1px solid #222}
.btn.ble.on{border-color:#ffffff44;color:#fff}
.cal-bar{height:3px;background:#151518;border-radius:2px;margin-bottom:10px;overflow:hidden;display:none}
.cal-bar.show{display:block}
.cal-fill{height:100%;background:#CECED6;border-radius:2px;width:0%;transition:width .1s}
.modes{display:flex;gap:6px;margin-bottom:10px}
.md{flex:1;padding:8px;background:#111;border:1px solid #1A1A1E;color:#444;font-family:Calibri,sans-serif;font-size:10px;letter-spacing:1px;cursor:pointer;border-radius:4px;text-align:center}
.md.on{border-color:#ffffff44;color:#fff;background:#141418}
.vib{background:#0E0E10;border:1px solid #1A1A1E;border-radius:4px;padding:14px;text-align:center;margin-bottom:10px}
.vib-l{font-size:9px;letter-spacing:2px;color:#444;margin-bottom:5px;font-family:Consolas,monospace}
.vib-s{font-size:20px;font-weight:700;letter-spacing:4px}
.vib-s.on{color:#fff;animation:sh .08s infinite alternate}
.vib-s.off{color:#222}
@keyframes sh{0%{transform:translateX(-1px)}100%{transform:translateX(1px)}}
.vib-p{font-size:10px;color:#444;margin-top:4px;font-family:Consolas,monospace}
.nf{font-size:10px;color:#444;font-family:Consolas,monospace;text-align:center;margin-bottom:10px}.nf span{color:#CECED6}
.spec{background:#0E0E10;border:1px solid #1A1A1E;border-radius:4px;overflow:hidden;margin-bottom:10px;height:65px}
.spec canvas{width:100%;height:100%;display:block}
.meters{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:10px}
.m{background:#0E0E10;border:1px solid #141418;border-radius:4px;padding:9px}
.m-l{font-size:9px;letter-spacing:1.5px;color:#444;margin-bottom:4px;font-family:Consolas,monospace}
.m-b{height:5px;background:#1A1A1E;border-radius:2px;overflow:hidden}
.m-f{height:100%;border-radius:2px;width:0%;transition:width 50ms}
.m-v{font-size:14px;font-weight:700;margin-top:3px;font-variant-numeric:tabular-nums;font-family:Consolas,monospace;color:#888}
.c1 .m-f{background:#5DCAA5}.c2 .m-f{background:#EF9F27}.c3 .m-f{background:#AFA9EC}
.zn{margin-bottom:10px}
.zn-t{font-size:9px;letter-spacing:2px;color:#333;margin-bottom:5px;font-family:Consolas,monospace}
.zg{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.z{background:#0E0E10;border:2px solid #181818;border-radius:4px;padding:10px 6px;text-align:center;transition:all 60ms}
.z.on{border-color:#ffffff55;box-shadow:0 0 10px rgba(255,255,255,.08)}
.z-i{font-size:14px;font-weight:700;letter-spacing:2px;font-family:Consolas,monospace;color:#444}
.z.on .z-i{color:#fff}
.z-b{font-size:8px;color:#333;letter-spacing:1px;margin-top:2px;font-family:Consolas,monospace}
.z-v{font-size:10px;margin-top:3px;color:#333;font-family:Consolas,monospace}
.sens{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:10px;color:#555;font-family:Consolas,monospace}
.sens input{flex:1;height:4px;-webkit-appearance:none;appearance:none;background:#1A1A1E;border-radius:2px;outline:none}
.sens input::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#CECED6;cursor:pointer}
.footer{text-align:center;padding:10px 0;font-size:8px;color:#222;letter-spacing:2px;font-family:Consolas,monospace}
</style>
</head>
<body>
<div class="hd"><div class="logo"><b>HAPTIC</b><span>WEAR</span></div><div class="st" id="st">STANDBY</div></div>
<div class="w">
<div class="viewport" id="viewport"></div>
<div class="btns">
<button class="btn" id="btn" onclick="go()">START</button>
<button class="btn" onclick="testVib()">TEST VIBRATE</button>
<button class="btn ble" id="bleBtn" onclick="toggleBLE()">CONNECT</button>
</div>
<div class="cal-bar" id="calBar"><div class="cal-fill" id="calFill"></div></div>
<div class="nf" id="nfDisp"></div>
<div class="sens"><span>SENSITIVITY</span><input type="range" min="1" max="10" value="7" id="sensSlider" oninput="sensitivity=parseInt(this.value);document.getElementById('sensV').textContent=this.value"><span id="sensV">7</span></div>
<div class="modes">
<button class="md on" id="md1" onclick="sm('cross')">CROSS-MODAL</button>
<button class="md" id="md2" onclick="sm('arb')">ARBITRARY</button>
<button class="md" id="md3" onclick="sm('off')">VIB OFF</button>
</div>
<div class="vib"><div class="vib-l">VIBRATION</div><div class="vib-s off" id="vs">OFF</div><div class="vib-p" id="vp">—</div></div>
<div class="spec"><canvas id="cv"></canvas></div>
<div class="meters">
<div class="m c1"><div class="m-l">LOW</div><div class="m-b"><div class="m-f" id="bL"></div></div><div class="m-v" id="vL">0%</div></div>
<div class="m c2"><div class="m-l">MID</div><div class="m-b"><div class="m-f" id="bM"></div></div><div class="m-v" id="vM">0%</div></div>
<div class="m c3"><div class="m-l">HIGH</div><div class="m-b"><div class="m-f" id="bH"></div></div><div class="m-v" id="vH">0%</div></div>
</div>
<div class="zn">
<div class="zn-t">FRONT</div>
<div class="zg">
<div class="z" id="z0"><div class="z-i">M1</div><div class="z-b">LOWER LEFT</div><div class="z-v" id="zv0">0%</div></div>
<div class="z" id="z1"><div class="z-i">M2</div><div class="z-b">LOWER RIGHT</div><div class="z-v" id="zv1">0%</div></div>
</div>
<div class="zn-t" style="margin-top:5px">BACK</div>
<div class="zg">
<div class="z" id="z2"><div class="z-i">M3</div><div class="z-b">LOWER LEFT</div><div class="z-v" id="zv2">0%</div></div>
<div class="z" id="z3"><div class="z-i">M4</div><div class="z-b">LOWER RIGHT</div><div class="z-v" id="zv3">0%</div></div>
</div>
</div>
<div class="footer">HAPTICWEAR · BARC0038 · THE BARTLETT UCL</div>
</div>
 
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"}}</script>
<script type="module">
import*as THREE from'three';import{GLTFLoader}from'three/addons/loaders/GLTFLoader.js';
const vp=document.getElementById('viewport'),scene=new THREE.Scene();scene.background=new THREE.Color(0x09090B);
const cam=new THREE.PerspectiveCamera(35,vp.clientWidth/vp.clientHeight,0.1,50);cam.position.set(0,0.2,2.8);
const ren=new THREE.WebGLRenderer({antialias:true});ren.setSize(vp.clientWidth,vp.clientHeight);ren.setPixelRatio(Math.min(window.devicePixelRatio,2));vp.appendChild(ren.domElement);
scene.add(new THREE.AmbientLight(0xffffff,0.5));const dl=new THREE.DirectionalLight(0xfff8ee,0.9);dl.position.set(3,4,3);scene.add(dl);
const r2=new THREE.DirectionalLight(0xddeeff,0.4);r2.position.set(-3,2,-2);scene.add(r2);
const group=new THREE.Group();scene.add(group);scene.add(new THREE.GridHelper(4,30,0x111114,0x111114).translateY(-0.85));
function buildProc(){const mat=new THREE.MeshStandardMaterial({color:0x1a1a1e,roughness:0.7,metalness:0.1,transparent:true,opacity:0.55});
group.add(new THREE.Mesh(new THREE.CylinderGeometry(0.28,0.22,1.0,24),mat).translateY(0.25));group.add(new THREE.Mesh(new THREE.CylinderGeometry(0.34,0.30,0.12,24),mat).translateY(0.64));
group.add(new THREE.Mesh(new THREE.CylinderGeometry(0.09,0.11,0.14,16),mat).translateY(0.82));group.add(new THREE.Mesh(new THREE.SphereGeometry(0.12,16,12),mat).translateY(1.0));
group.add(new THREE.Mesh(new THREE.CylinderGeometry(0.282,0.222,1.01,24,6),new THREE.MeshBasicMaterial({color:0x2a2a30,wireframe:true,transparent:true,opacity:0.12})).translateY(0.25))}
new GLTFLoader().load('hapticwear-model.glb',g=>{const m=g.scene,box=new THREE.Box3().setFromObject(m),sz=box.getSize(new THREE.Vector3()),ct=box.getCenter(new THREE.Vector3());
m.position.set(-ct.x,-ct.y,-ct.z);const wr=new THREE.Group();wr.add(m);wr.scale.setScalar(1.6/Math.max(sz.x,sz.y,sz.z));wr.position.y=0.25;
m.traverse(c=>{if(c.isMesh)c.material=new THREE.MeshStandardMaterial({color:0x8a8880,roughness:0.6,metalness:0.2,transparent:true,opacity:0.7,side:THREE.DoubleSide})});group.add(wr)},undefined,()=>buildProc());
const mpos=[{x:-0.16,y:0.0,z:0.20},{x:0.16,y:0.0,z:0.20},{x:-0.16,y:0.0,z:-0.18},{x:0.16,y:0.0,z:-0.18}];
const pads=[];mpos.forEach(p=>{const dir=p.z>=0?new THREE.Vector3(0,0,1):new THREE.Vector3(0,0,-1);
const rm=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0,side:THREE.DoubleSide,depthWrite:false});
const ring=new THREE.Mesh(new THREE.RingGeometry(0.04,0.07,32),rm);ring.position.set(p.x,p.y,p.z);ring.lookAt(p.x+dir.x,p.y+dir.y,p.z+dir.z);group.add(ring);
const cm=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.03,side:THREE.DoubleSide,depthWrite:false});
const core=new THREE.Mesh(new THREE.CircleGeometry(0.04,32),cm);core.position.set(p.x,p.y,p.z+(p.z>=0?0.001:-0.001));core.lookAt(p.x+dir.x,p.y+dir.y,p.z+dir.z);group.add(core);
pads.push({ring,rm,core,cm,a:0})});
let autoR=true,dragS=null,rotY=0;
vp.addEventListener('pointerdown',e=>{dragS=e.clientX;autoR=false});window.addEventListener('pointermove',e=>{if(dragS!==null){rotY+=(e.clientX-dragS)*0.01;dragS=e.clientX}});
window.addEventListener('pointerup',()=>{dragS=null;setTimeout(()=>autoR=true,3000)});
function anim(){requestAnimationFrame(anim);if(autoR)rotY+=0.003;group.rotation.y=rotY;
const mv=window._zv||[0,0,0,0];pads.forEach((p,i)=>{const t=mv[i];p.a+=(t-p.a)*0.2;const a=p.a;p.rm.opacity=a*0.7;p.cm.opacity=0.03+a*0.5;const s=1+a*0.4;p.ring.scale.set(s,s,s)});
ren.render(scene,cam)}anim();
window.addEventListener('resize',()=>{cam.aspect=vp.clientWidth/vp.clientHeight;cam.updateProjectionMatrix();ren.setSize(vp.clientWidth,vp.clientHeight)});
</script>
<script>
var ax,an,fft,run=false,mode='cross',af,cv,cx;
var FS=1024,SR=44100;
var lt=0,noiseFloor=0,calibrated=false,calSamples=[];
var sensitivity=7;
var bleDevice,bleChar,bleOn=false;
window._zv=[0,0,0,0];
 
function testVib(){if('vibrate'in navigator)navigator.vibrate([300,80,300,80,300])}
function ic(){cv=document.getElementById('cv');cx=cv.getContext('2d');cv.width=cv.offsetWidth*2;cv.height=cv.offsetHeight*2}
 
async function toggleBLE(){
  if(bleOn){if(bleDevice&&bleDevice.gatt.connected)bleDevice.gatt.disconnect();bleOn=false;document.getElementById('bleBtn').textContent='CONNECT';document.getElementById('bleBtn').classList.remove('on');return}
  try{bleDevice=await navigator.bluetooth.requestDevice({filters:[{name:'HapticWear'}],optionalServices:['19b10000-e8f2-537e-4f6c-d104768a1214']});
  var srv=await bleDevice.gatt.connect();var svc=await srv.getPrimaryService('19b10000-e8f2-537e-4f6c-d104768a1214');
  bleChar=await svc.getCharacteristic('19b10001-e8f2-537e-4f6c-d104768a1214');bleOn=true;
  document.getElementById('bleBtn').textContent='CONNECTED';document.getElementById('bleBtn').classList.add('on');
  bleDevice.addEventListener('gattserverdisconnected',function(){bleOn=false;document.getElementById('bleBtn').textContent='CONNECT';document.getElementById('bleBtn').classList.remove('on')});
  }catch(e){console.error(e)}}
 
async function sendBLE(v){if(!bleOn||!bleChar)return;try{await bleChar.writeValueWithoutResponse(new Uint8Array(v).buffer)}catch(e){}}
 
async function go(){
  var btn=document.getElementById('btn');
  if(run){stop();btn.textContent='START';btn.classList.remove('go');return}
  try{
    ax=new(window.AudioContext||window.webkitAudioContext)({sampleRate:SR});
    var s=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
    var src=ax.createMediaStreamSource(s);
    an=ax.createAnalyser();an.fftSize=FS;an.smoothingTimeConstant=0.4;
    src.connect(an);fft=new Float32Array(an.frequencyBinCount);
    run=true;btn.textContent='STOP';btn.classList.add('go');
    calibrated=false;calSamples=[];noiseFloor=0;
    document.getElementById('st').textContent='CALIBRATING';document.getElementById('st').className='st cal';
    document.getElementById('calBar').classList.add('show');document.getElementById('nfDisp').textContent='Stay quiet...';
    ic();lp();
  }catch(e){console.error(e)}}
 
function stop(){run=false;if(af)cancelAnimationFrame(af);if(ax)ax.close();navigator.vibrate(0);calibrated=false;
  document.getElementById('st').textContent='STANDBY';document.getElementById('st').className='st';
  document.getElementById('vs').textContent='OFF';document.getElementById('vs').className='vib-s off';
  document.getElementById('calBar').classList.remove('show');document.getElementById('nfDisp').textContent=''}
 
window.sm=function(m){mode=m;document.querySelectorAll('.md').forEach(function(b){b.classList.remove('on')});
  document.getElementById(m==='cross'?'md1':m==='arb'?'md2':'md3').classList.add('on');if(m==='off')navigator.vibrate(0)};
 
function fi(f){return Math.round(f*FS/SR)}
function tdRMS(){var buf=new Float32Array(an.fftSize);an.getFloatTimeDomainData(buf);var s=0;for(var i=0;i<buf.length;i++)s+=buf[i]*buf[i];return Math.sqrt(s/buf.length)}
function be(d,lo,hi){var a=fi(lo),b=Math.min(fi(hi),d.length-1);var s=0,n=0;for(var i=a;i<=b;i++){var v=Math.pow(10,d[i]/20);s+=v;n++}return n>0?s/n:0}
 
var sLo=0,sMi=0,sHi=0,sRms=0;
var SMOOTH=0.3;
var lastVibEnd=0;
 
function doVib(r,lo,mi,hi){
  if(mode==='off'){navigator.vibrate(0);return{p:'OFF',z:[0,0,0,0]}}
  var sensMultiplier=sensitivity/5;
  var gate=noiseFloor*(3.0-sensMultiplier*1.5);
  var rGated=Math.max(0,r-gate);
  if(rGated<0.002){navigator.vibrate(0);return{p:'SILENT',z:[0,0,0,0]}}
  var headroom=Math.max(0.01,0.15-gate);
  var rN=Math.min(rGated/headroom*sensMultiplier,1);
  var lN=Math.min(lo/0.003*sensMultiplier,1);
  var mN=Math.min(mi/0.002*sensMultiplier,1);
  var hN=Math.min(hi/0.0008*sensMultiplier,1);
  var z,pd;
  if(mode==='cross'){z=[lN*rN,lN*rN,lN*rN*0.7,lN*rN*0.7];pd='CROSS-MODAL'}
  else{z=[hN*rN,mN*rN,mN*rN*0.7,hN*rN*0.7];pd='ARBITRARY'}
  var mx=Math.max.apply(null,z);var now=Date.now();
  if(now-lt>45){lt=now;
    if(mx>0.03){var dur=Math.round(25+mx*150);var band;
      if(mode==='cross'){if(lN>=mN&&lN>=hN){navigator.vibrate([dur+40,10]);band='LOW'}else if(hN>=mN){navigator.vibrate([12,6,12,6,12,6,12]);band='HIGH'}else{navigator.vibrate([dur,15,dur/2,15]);band='MID'}}
      else{navigator.vibrate([dur,25]);band=lN>=mN&&lN>=hN?'LOW':hN>=mN?'HIGH':'MID'}
      pd+=' · '+band;lastVibEnd=now+dur}
    else{if(now>lastVibEnd)navigator.vibrate(0)}}
  if(bleOn){var bv=[];for(var i=0;i<4;i++)bv.push(Math.min(200,Math.round(z[i]*255)));sendBLE(bv)}
  return{p:pd,z}}
 
function ds(d){
  var w=cv.width,h=cv.height;cx.fillStyle='#0A0A0C';cx.fillRect(0,0,w,h);
  if(!an||!run)return;
  var n=Math.min(80,d.length),bw=w/n;
  for(var i=0;i<n;i++){var v=(d[i]+100)/100,bh=Math.max(0,v*h*.85),f=i*SR/FS;
    var r,g,b;if(f<300){r=93;g=202;b=165}else if(f<2000){r=239;g=159;b=39}else{r=175;g=169;b=236}
    cx.fillStyle='rgba('+r+','+g+','+b+','+(0.15+v*0.2)+')';cx.fillRect(i*bw,h-bh,bw-1,bh);
    cx.fillStyle='rgba('+r+','+g+','+b+',0.8)';cx.fillRect(i*bw,h-bh,bw-1,2)}
  if(calibrated&&noiseFloor>0){var nfY=h-(noiseFloor/0.05)*h;cx.strokeStyle='rgba(255,255,255,0.08)';cx.lineWidth=1;cx.setLineDash([4,4]);cx.beginPath();cx.moveTo(0,nfY);cx.lineTo(w,nfY);cx.stroke();cx.setLineDash([])}}
 
var calStart=0;
function lp(){
  if(!run)return;af=requestAnimationFrame(lp);
  an.getFloatFrequencyData(fft);
  var r=tdRMS();
  var lo=be(fft,20,300),mi=be(fft,300,2000),hi=be(fft,2000,8000);
  sRms=sRms*SMOOTH+r*(1-SMOOTH);sLo=sLo*SMOOTH+lo*(1-SMOOTH);sMi=sMi*SMOOTH+mi*(1-SMOOTH);sHi=sHi*SMOOTH+hi*(1-SMOOTH);
 
  if(!calibrated){
    if(calStart===0)calStart=Date.now();calSamples.push(r);
    var elapsed=(Date.now()-calStart)/2000;
    document.getElementById('calFill').style.width=Math.min(elapsed*100,100)+'%';
    if(elapsed>=1){
      var mean=0;for(var i=0;i<calSamples.length;i++)mean+=calSamples[i];mean/=calSamples.length;
      var variance=0;for(var i=0;i<calSamples.length;i++)variance+=(calSamples[i]-mean)*(calSamples[i]-mean);
      variance/=calSamples.length;var std=Math.sqrt(variance);
      noiseFloor=mean+std;calibrated=true;calStart=0;
      document.getElementById('st').textContent='LIVE';document.getElementById('st').className='st on';
      document.getElementById('calBar').classList.remove('show');
      document.getElementById('nfDisp').innerHTML='Noise floor: <span>'+noiseFloor.toFixed(4)+'</span>'}
    ds(fft);return}
 
  var sensM=sensitivity/5;
  var lP=Math.min(sLo/0.003*sensM*100,100),mP=Math.min(sMi/0.002*sensM*100,100),hP=Math.min(sHi/0.0008*sensM*100,100);
  document.getElementById('bL').style.width=lP+'%';document.getElementById('vL').textContent=Math.round(lP)+'%';
  document.getElementById('bM').style.width=mP+'%';document.getElementById('vM').textContent=Math.round(mP)+'%';
  document.getElementById('bH').style.width=hP+'%';document.getElementById('vH').textContent=Math.round(hP)+'%';
  var res=doVib(sRms,sLo,sMi,sHi);window._zv=res.z;
  for(var i=0;i<4;i++){var el=document.getElementById('z'+i),pct=Math.round(res.z[i]*100);
    if(el){if(pct>5)el.classList.add('on');else el.classList.remove('on')}
    var ve=document.getElementById('zv'+i);if(ve)ve.textContent=pct+'%'}
  var mx=Math.max.apply(null,res.z),vsEl=document.getElementById('vs'),vpEl=document.getElementById('vp');
  if(mode!=='off'&&mx>0.03){vsEl.textContent='ACTIVE';vsEl.className='vib-s on';vpEl.textContent=res.p}
  else{vsEl.textContent=mode==='off'?'DISABLED':'QUIET';vsEl.className='vib-s off';vpEl.textContent=mode==='off'?'—':'Below gate'}
  ds(fft)}
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(function(){});
</script>
</body>
</html>
